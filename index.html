<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Tantriku - Nu Skin Purwokerto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen p-4">

    <header class="w-full max-w-md mt-6 mb-8 text-center">
        <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Tantriku</h1>
        <p class="text-sm text-slate-500 italic">Distributor Resmi Nu Skin Purwokerto</p>
        <div class="mt-2 h-1 w-16 bg-teal-400 mx-auto rounded-full"></div>
    </header>

    <main class="w-full max-w-md grid grid-cols-2 gap-4">
        
        <a href="https://script.google.com/macros/s/AKfycbzbP5ne_JAwhGEf54LN2KxojUCKHErHIV2tYJ2ccXOt9ETML0N-gVldE9mTOVllo22bVg/exec?p=transaksi" 
           class="glass-card flex flex-col items-center justify-center p-6 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-slate-700">
            <div class="bg-teal-100 p-3 rounded-2xl mb-3">
                <i data-lucide="shopping-cart" class="text-teal-600 w-8 h-8"></i>
            </div>
            <span class="font-semibold text-sm uppercase tracking-wide">Transaksi</span>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbwCdiZ2g-94AKRpWtSdSq7YBBOKyGm9nn6gbpRYBITqF9ZikMbGUx9e12lH9FDT3AKz/exec" 
           class="glass-card flex flex-col items-center justify-center p-6 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-slate-700">
            <div class="bg-blue-100 p-3 rounded-2xl mb-3">
                <i data-lucide="users" class="text-blue-600 w-8 h-8"></i>
            </div>
            <span class="font-semibold text-sm uppercase tracking-wide">CRM</span>
        </a>

        <a href="https://script.google.com/macros/s/AKfycbxhCwiApYzGLG9TmnKiCIkQULAU1Q5Zm5cbnhZAK-4RkB2MQ_cbtBqxLPZC5_j8Owj3/exec" 
           class="glass-card flex flex-col items-center justify-center p-6 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-slate-700">
            <div class="bg-rose-100 p-3 rounded-2xl mb-3">
                <i data-lucide="ticket-percent" class="text-rose-600 w-8 h-8"></i>
            </div>
            <span class="font-semibold text-sm uppercase tracking-wide">Promo</span>
        </a>

        <a href="#" 
           onclick="alert('Link Laporan sedang diproses')"
           class="glass-card flex flex-col items-center justify-center p-6 rounded-3xl shadow-sm hover:shadow-md transition-all active:scale-95 text-slate-400 border-dashed border-2 border-slate-200">
            <div class="bg-slate-100 p-3 rounded-2xl mb-3">
                <i data-lucide="bar-chart-3" class="text-slate-400 w-8 h-8"></i>
            </div>
            <span class="font-semibold text-sm uppercase tracking-wide">Laporan</span>
        </a>

    </main>

    <footer class="mt-auto mb-4 text-slate-400 text-xs text-center">
        &copy; 2026 Tantriku CRM System <br> Powered by Google Apps Script
    </footer>

    <script>
      lucide.createIcons();
    </script>
</body>
</html>
